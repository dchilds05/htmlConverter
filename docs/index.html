<body>
    <h1>Hey Randy! Please paste your text to be converted here</h1>

    <textarea id="userInput" rows = "25" cols="200"></textarea><br><br>

    <button onclick = "htmlConverter()" > Submit</button>

    <p id="message"></p>

    <script>
        function addH5EndTag(s){
            let inH5Tag = false;
            for(let i = 0; i < s.length; i++){
                if(i < s.length-4 && s[i] === "<" && s[i+1] === "h" && s[i+2] === "5" && s[i+3] === ">"){
                    inH5Tag = true;
                }
                if(inH5Tag && i < s.length-4 && s[i] === "<" && s[i+1] === "/" && s[i+2] === "p" && s[i+3] === ">"){
                    s = s.slice(0,i) + "</h5>" + s.slice(i+4);
                    inH5Tag = false;
                }
            }
            return s;
        }

        function addSpotEndTag(s){
            let needSpotTag = false;
            for(let i = 0; i < s.length; i++){
                if(i < s.length-5 && s[i] === "<" && s[i+1] === "b" && s[i+2] === ">" && s[i+3] === "*" && s[i+4] === " "){
                    //console.log("entering the h5 tag");
                    needSpotTag = true;
                }
                if(needSpotTag && i > 5 && s[i] === "T" && s[i-1] === "O" && s[i-2] === "P" && s[i-3] === "S" && s[i-4] === " "){
                    //console.log("adding closing tag");
                    s = s.slice(0,i+1) + "</b>" + s.slice(i+1);
                    needSpotTag = false;
                }
            }
            return s;
        }
        
        function driveTimeFormatter(s){
            let startMarker = "DRIVETIME UNIT COUNT SAMPLE";
            let startIdx = s.indexOf(startMarker);
            if(startIdx === -1) return s;

            // Find the closing comment after the header
            let headerEnd = s.indexOf("-->", startIdx);
            if(headerEnd === -1) return s;
            headerEnd += 3;

            // Find the next section's opening comment
            let endIdx = s.indexOf("<!--", headerEnd);
            if(endIdx === -1) return s;

            // Extract content, strip HTML tags, and build pre block
            let content = s.slice(headerEnd, endIdx);
            content = content.replace(/<[^>]+>/g, '');
            let lines = content.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            // Add blank line before PM HOUR entries
            let preContent = '';
            for(let i = 0; i < lines.length; i++){
                if(i > 0 && lines[i].match(/^\d+(AM|PM) HOUR/)){
                    preContent += '\n';
                }
                preContent += lines[i] + '\n';
            }

            s = s.slice(0, headerEnd) + '\n\n<pre>\n' + preContent + '</pre>\n\n' + s.slice(endIdx);
            return s;
        }

        function compSampleHourFormatter(s){
            let inCompSampleHour = false;
            let inQuote = false;
            for(let i = 0; i < s.length; i++){
                if(!inCompSampleHour && i < s.length-27 && s[i] === "C" && s[i+1] === "O" && s[i+2] === "M" && s[i+3] === "P" && 
                s[i+4] === "R" && s[i+5] === "E" && s[i+6] === "H" && s[i+7] === "E" && 
                s[i+8] === "N" && s[i+9] === "S" && s[i+10] === "I" && s[i+11] === "V" && 
                s[i+12] === "E" && s[i+13] === " " && s[i+14] === "S" && s[i+15] === "A" && 
                s[i+16] === "M" && s[i+17] === "P" && s[i+18] === "L" && s[i+19] === "E" && 
                s[i+20] === " " && s[i+21] === "H" && s[i+22] === "O" && s[i+23] === "U" && 
                s[i+24] === "R"){
                    inCompSampleHour = true;
                }

                if(!inCompSampleHour){
                    continue;
                }

                if(s[i] === '“'){
                    inQuote = true;
                }
                else if(s[i] === '”'){
                    inQuote = false;
                }

                if(inQuote && s[i] === "<" && s[i+1] === "b" && s[i+2] === ">" && s[i+3] === "("){
                    s = s.slice(0,i) + s.slice(i+3);
                }

                if(inQuote && s[i] === ")" && s[i+1] === "<" && s[i+2] === "/" && s[i+3] === "b" && s[i+4] === ">"){
                    s = s.slice(0,i+1) + s.slice(i+5);
                }
            }    
            return s;
        }

        function htmlConverter(){
            let userInput = document.querySelector("#userInput");
            let message = document.querySelector("#message");
            let s = userInput.value;

            //Add H4 tags
            const positioningString = '<hr ID="2"> <br> <h4>POSITIONING  <span class="top"><a href="#TOP">(Top)</a></span></h4>';
            let positionHrEqualsSigns = '';
            for (let i = 0; i < positioningString.length - 9; i++) positionHrEqualsSigns += '=';
            const promotionsString = '<hr ID="3"> <br> <h4>PROMOTIONS  <span class="top"><a href="#TOP">(Top)</a></span></h4>';
            let promotionHrEqualsSigns = '';
            for (let i = 0; i < promotionsString.length - 9; i++) promotionHrEqualsSigns += '=';
            const featuresString = '<hr ID="4"> <br> <h4>FEATURES  <span class="top"><a href="#TOP">(Top)</a></span></h4>';
            let featuresHrEqualsSigns = '';
            for (let i = 0; i < featuresString.length - 9; i++) featuresHrEqualsSigns += '=';
            const morningShowString = '<hr ID="5"> <br> <h4>MORNING SHOW  <span class="top"><a href="#TOP">(Top)</a></span></h4>';
            let morningShowHrEqualsSigns = '';
            for (let i = 0; i < morningShowString.length - 9; i++) morningShowHrEqualsSigns += '=';
            const drivetimeString = '<hr ID="6"> <br> <h4>DRIVETIME UNIT COUNT SAMPLE  <span class="top"><a href="#TOP">(Top)</a></span></h4>';
            let drivetimeHrEqualsSigns = '';
            for (let i = 0; i < drivetimeString.length - 9; i++) drivetimeHrEqualsSigns += '=';
            const comprehensiveString = '<hr ID="7"> <br> <h4>COMPREHENSIVE SAMPLE HOUR  <span class="top"><a href="#TOP">(Top)</a></span></h4>';
            let comprehensiveHrEqualsSigns = '';
            for (let i = 0; i < comprehensiveString.length - 9; i++) comprehensiveHrEqualsSigns += '=';
            const openingHrBracket = '<!-- ';
            const closingHrBracket = ' -->';

            s = s.replace("POSITIONING (Top)",openingHrBracket + positionHrEqualsSigns + closingHrBracket + '\n' + positioningString + '\n' + openingHrBracket + positionHrEqualsSigns + closingHrBracket);
            s = s.replace("PROMOTIONS (Top)",openingHrBracket + promotionHrEqualsSigns + closingHrBracket + '\n' + promotionsString + '\n' + openingHrBracket + promotionHrEqualsSigns + closingHrBracket);
            s = s.replace("FEATURES (Top)",openingHrBracket + featuresHrEqualsSigns + closingHrBracket + '\n' + featuresString + '\n' + openingHrBracket + featuresHrEqualsSigns + closingHrBracket);
            s = s.replace("MORNING SHOW (Top)",openingHrBracket + morningShowHrEqualsSigns + closingHrBracket + '\n' + morningShowString + '\n' + openingHrBracket + morningShowHrEqualsSigns + closingHrBracket);
            s = s.replace("DRIVETIME UNIT COUNT SAMPLE (Top)",openingHrBracket + drivetimeHrEqualsSigns + closingHrBracket + '\n' + drivetimeString + '\n' + openingHrBracket + drivetimeHrEqualsSigns + closingHrBracket + '\n');
            s = s.replace("COMPREHENSIVE SAMPLE HOUR (Top)",openingHrBracket + comprehensiveHrEqualsSigns + closingHrBracket + '\n' + comprehensiveString + '\n' + openingHrBracket + comprehensiveHrEqualsSigns + closingHrBracket);
            
            // Add bold tags
            s = s.replaceAll("[","<b>[");
            s = s.replaceAll("(","<b>(");
            s = s.replaceAll("* ","<b>* ");
            s = s.replaceAll("]","]</b>");
            s = s.replaceAll(")",")</b>");
            s = addSpotEndTag(s);
            s = s.replaceAll("<b>(Top)</b>","(Top)");

            // Add paragraph tags
            s = s.replace(/^/gm, '<p>');
            s = s.replace(/$/gm, '</p>');

            //Clean up endings
            s = s.replaceAll("<b> ","<b>");
            s = s.replaceAll("<p> ","<p>");
            s = s.replaceAll(" </b>","</b>");
            s = s.replaceAll(" </p>","</p>");
            s = s.replaceAll(" </p>","</p>");
            s = s.replaceAll(" </p>","</p>");
            s = s.replaceAll(" </p>","</p>");
            s = s.replaceAll("<p></p>","");

            //Add H5 tags
            s = s.replaceAll("\n\n<p>", '\n\n<h5>');
            s = s.replaceAll("<h5><h4>","<h4>");
            s = addH5EndTag(s);

            //Get rid of doubled-up header and paragraph tags
            s = s.replaceAll("<p><h","<h");
            s = s.replaceAll("</h4></p>","</h4>");
            s = s.replaceAll("</h5></p>","</h5>");
            s = s.replaceAll("<p><br><br></p>","<br><br>");
            s = s.replaceAll("</h5>\n\n<h5>","</h5><br>\n\n<h5>");
            s = s.replaceAll("<p><!-","<!-");
            s = s.replaceAll(" --></p>"," -->");

            //Add line breaks
            s = s.replaceAll("<p>Unable to load the shape</p>","");
            s = s.replaceAll("<p>Shape</p>","");
            s = s.replaceAll("<p>________________________________________</p>","");

            //Comprehensive Sample Hour
            s = compSampleHourFormatter(s);

            //Quotes and apostrophes
            s = s.replace(/[\u2018\u2019]/g, "'");
            s = s.replace(/[\u201C\u201D]/g, '"');

            //Drivetime unit count sample
            s = driveTimeFormatter(s);

            // Return response
            message.innerHTML = "<xmp>" + s + "</xmp>";
        }
    </script>

</body>
